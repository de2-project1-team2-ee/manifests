<rect x="84" y="528" width="308" height="40" rx="6" fill="#1D9E75" stroke="#085041" stroke-width="0.5"/>
<text x="238" y="544" text-anchor="middle" fill="white" class="th">Worker Node 1</text>
<text x="238" y="560" text-anchor="middle" fill="#E1F5EE" class="ts">m7i-flex.large  /  SSM 접근</text>

<!-- Private SN2 -->
<rect x="452" y="458" width="380" height="124" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="642" y="480" text-anchor="middle" fill="#085041" class="th">Private-SN-2</text>
<text x="642" y="498" text-anchor="middle" fill="#0F6E56" class="ts">10.0.12.0/24  ap-northeast-2b</text>
<text x="642" y="516" text-anchor="middle" fill="#0F6E56" class="ts">Route: 0.0.0.0/0 → NAT GW</text>
<rect x="468" y="528" width="348" height="40" rx="6" fill="#1D9E75" stroke="#085041" stroke-width="0.5"/>
<text x="642" y="544" text-anchor="middle" fill="white" class="th">Worker Node 2</text>
<text x="642" y="560" text-anchor="middle" fill="#E1F5EE" class="ts">m7i-flex.large  /  SSM 접근</text>

<!-- ALB → Worker Nodes -->
<path d="M380 408 L238 408 L238 528" stroke="#7F77DD" stroke-width="1" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>
<path d="M480 408 L642 408 L642 528" stroke="#7F77DD" stroke-width="1" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-green)"/>

<!-- NAT GW → Private -->
<path d="M148 408 L148 458" stroke="#BA7517" stroke-width="1" fill="none" stroke-dasharray="5 3" marker-end="url(#arrow-amber)"/>

<!-- EKS Control Plane -->
<rect x="50" y="618" width="800" height="68" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="70" y="642" fill="#26215C" class="th">EKS Control Plane  (AWS Managed)</text>
<text x="70" y="660" fill="#534AB7" class="ts">project-eks  /  Kubernetes 1.34  /  OIDC Provider  /  CloudWatch 로깅  /  vpc-cni · coredns · kube-proxy · ebs-csi-driver</text>

<!-- Worker → Control Plane -->
<line x1="238" y1="582" x2="238" y2="618" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow-green)"/>
<line x1="642" y1="582" x2="642" y2="618" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow-green)"/>

<!-- eks-man-wa → Control Plane -->
<path d="M745 408 L745 652 L850 652" stroke="#888780" stroke-width="1" fill="none" stroke-dasharray="5 3"/>

<!-- 범례 -->
<rect x="30" y="706" width="840" height="50" rx="8" fill="#F1EFE8" stroke="#D3D1C7" stroke-width="0.5"/>
