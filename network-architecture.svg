<line x1="230" y1="722" x2="270" y2="722" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 3"/>
<text x="278" y="726" fill="#444441" class="ts">ALB 분산</text>
<line x1="360" y1="722" x2="400" y2="722" stroke="#BA7517" stroke-width="1" stroke-dasharray="5 3"/>
