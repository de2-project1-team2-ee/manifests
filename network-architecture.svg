<line x1="660" y1="722" x2="700" y2="722" stroke="#888780" stroke-width="1" stroke-dasharray="5 3"/>
<text x="708" y="726" fill="#444441" class="ts">관리 경로</text>

<text x="50" y="746" fill="#888780" class="ts">project-network.yaml + project-eks-cluster.yaml  /  리전: ap-northeast-2 (서울)</text>
