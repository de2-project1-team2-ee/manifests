<svg width="900" height="640" viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#378ADD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, sans-serif; }
    .th { font-size: 14px; font-weight: bold; }
    .ts { font-size: 12px; }
  </style>
</defs>

<rect width="900" height="640" fill="#FFFFFF"/>

<!-- 제목 -->
<rect x="20" y="10" width="860" height="36" rx="8" fill="#1F4E79"/>
<text x="450" y="33" text-anchor="middle" fill="white" class="th">CI/CD 파이프라인  —  GitHub Actions + ECR + ArgoCD + EKS</text>

<!-- ── CI 영역 ── -->
<rect x="30" y="62" width="380" height="290" rx="14" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="50" y="86" fill="#0C447C" class="th">CI  (GitHub Actions)</text>

<!-- Step1: 코드 push -->
<rect x="50" y="96" width="340" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="220" y="117" text-anchor="middle" fill="#2C2C2A" class="th">개발자 코드 push</text>
<text x="220" y="135" text-anchor="middle" fill="#5F5E5A" class="ts">main 브랜치 push → Actions 자동 트리거</text>

<line x1="220" y1="146" x2="220" y2="164" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

<!-- Step2: Docker 빌드 -->
<rect x="50" y="164" width="340" height="50" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="220" y="185" text-anchor="middle" fill="#0C447C" class="th">Docker 이미지 빌드</text>
<text x="220" y="203" text-anchor="middle" fill="#185FA5" class="ts">nginx:alpine  /  커밋 SHA → 이미지 태그</text>

<line x1="220" y1="214" x2="220" y2="232" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

<!-- Step3: ECR push -->
<rect x="50" y="232" width="340" height="50" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="220" y="253" text-anchor="middle" fill="#0C447C" class="th">AWS ECR push</text>
<text x="220" y="271" text-anchor="middle" fill="#185FA5" class="ts">OIDC IAM Role 인증  /  액세스 키 없음</text>

<line x1="220" y1="282" x2="220" y2="300" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

<!-- Step4: manifests 업데이트 -->
<rect x="50" y="300" width="340" height="50" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
<text x="220" y="321" text-anchor="middle" fill="#0C447C" class="th">manifests 레포 태그 업데이트</text>
<text x="220" y="339" text-anchor="middle" fill="#185FA5" class="ts">k8s/deployment.yaml image 태그 자동 교체</text>

<!-- ── CD 영역 ── -->
<rect x="490" y="62" width="380" height="290" rx="14" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="510" y="86" fill="#04342C" class="th">CD  (ArgoCD)</text>

<!-- Step5: 감시 -->
<rect x="510" y="96" width="340" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="680" y="117" text-anchor="middle" fill="#085041" class="th">manifests 레포 감시</text>
<text x="680" y="135" text-anchor="middle" fill="#0F6E56" class="ts">3분 폴링 또는 webhook으로 변경 감지</text>

<line x1="680" y1="146" x2="680" y2="164" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- Step6: 비교 -->
<rect x="510" y="164" width="340" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="680" y="185" text-anchor="middle" fill="#04342C" class="th">Git 상태 vs 클러스터 상태 비교</text>
<text x="680" y="203" text-anchor="middle" fill="#0F6E56" class="ts">다르면 자동 동기화 실행 (selfHeal)</text>

<line x1="680" y1="214" x2="680" y2="232" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- Step7: Rolling Update -->
<rect x="510" y="232" width="340" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="680" y="253" text-anchor="middle" fill="#04342C" class="th">Rolling Update 무중단 배포</text>
<text x="680" y="271" text-anchor="middle" fill="#0F6E56" class="ts">maxUnavailable: 0  /  서비스 중단 없음</text>

<line x1="680" y1="282" x2="680" y2="300" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>

<!-- Step8: 완료 -->
<rect x="510" y="300" width="340" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
<text x="680" y="321" text-anchor="middle" fill="#04342C" class="th">EKS 파드 교체 완료</text>
<text x="680" y="339" text-anchor="middle" fill="#0F6E56" class="ts">nginx 새 이미지로 파드 실행</text>

<!-- CI → CD 연결 화살표 -->
<path d="M390 325 L440 325 L440 111 L508 111" stroke="#1D9E75" stroke-width="1.5" fill="none" marker-end="url(#arrow-green)"/>
<text x="440" y="318" text-anchor="middle" fill="#0F6E56" class="ts">push</text>

<!-- ── 저장소 영역 ── -->
<rect x="30" y="372" width="840" height="90" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="50" y="394" fill="#26215C" class="th">저장소</text>

<rect x="50" y="402" width="220" height="46" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
<text x="160" y="421" text-anchor="middle" fill="#26215C" class="th">AWS ECR</text>
<text x="160" y="439" text-anchor="middle" fill="#3C3489" class="ts">nginx 이미지 저장소</text>

<rect x="330" y="402" width="240" height="46" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
<text x="450" y="421" text-anchor="middle" fill="#26215C" class="th">GitHub (manifests)</text>
<text x="450" y="439" text-anchor="middle" fill="#3C3489" class="ts">k8s yaml 저장 / ArgoCD 감시</text>

<rect x="630" y="402" width="220" height="46" rx="8" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
<text x="740" y="421" text-anchor="middle" fill="#26215C" class="th">AWS EKS</text>
<text x="740" y="439" text-anchor="middle" fill="#3C3489" class="ts">project-eks / nginx 파드 실행</text>

<!-- 저장소 연결선 -->
<path d="M160 402 L160 350 L220 350" stroke="#7F77DD" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/>
<path d="M450 402 L450 350 L508 350" stroke="#7F77DD" stroke-width="1" fill="none" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/>
<path d="M740 402 L740 350 L850 350" stroke="#7F77DD" stroke-width="1" fill="none" stroke-dasharray="4 3"/>

<!-- ── 롤백 영역 ── -->
<rect x="30" y="480" width="840" height="54" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="50" y="502" fill="#412402" class="th">롤백 방법  —  문제 발생 시</text>
<text x="50" y="522" fill="#854F0B" class="ts">git revert 후 push  →  ArgoCD가 이전 이미지로 자동 복구  /  또는 ArgoCD UI에서 이전 버전 클릭 한 번으로 즉시 롤백</text>

<!-- ── GitHub Secrets ── -->
<rect x="30" y="550" width="840" height="56" rx="12" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="50" y="572" fill="#2C2C2A" class="th">GitHub Secrets 등록 필요  (Settings → Secrets → Actions)</text>
<text x="50" y="592" fill="#5F5E5A" class="ts">AWS_ACCOUNT_ID  /  AWS_REGION  /  ECR_REPOSITORY  /  MANIFESTS_REPO  /  MANIFESTS_TOKEN</text>

<!-- 범례 -->
<rect x="30" y="616" width="840" height="16" rx="4" fill="none"/>
<line x1="50" y1="624" x2="90" y2="624" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
<text x="98" y="628" fill="#444441" class="ts">CI 흐름</text>
<line x1="200" y1="624" x2="240" y2="624" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-green)"/>
<text x="248" y="628" fill="#444441" class="ts">CD 흐름</text>
<line x1="350" y1="624" x2="390" y2="624" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3"/>
<text x="398" y="628" fill="#444441" class="ts">저장소 연결</text>
<text x="530" y="628" fill="#888780" class="ts">ci.yaml  /  argocd-install.yaml  /  argocd-app.yaml</text>
</svg>
