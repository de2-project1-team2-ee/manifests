# ──────────────────────────────────────────────
# templates/hpa.yaml
# Horizontal Pod Autoscaler
# CPU 사용률 50% 초과 시 Pod 자동 증가 (최대 10개)
# 사전 조건: Metrics Server 설치 완료 (04_setup_autoscaling_tools)
# ──────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: project-app-hpa
  namespace: dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: project-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
