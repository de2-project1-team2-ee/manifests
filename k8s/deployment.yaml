# ──────────────────────────────────────────────
# templates/deployment.yaml
# 앱: FastAPI 핫딜 쿠폰 서비스
# GitHub Actions CI가 image 태그를 자동으로 업데이트합니다.
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-app
  namespace: dev
  labels:
    app: project-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # 무중단 배포
  template:
    metadata:
      labels:
        app: project-app
    spec:
      containers:
        - name: project-app
          # GitHub Actions CI가 이 값을 자동으로 업데이트합니다.
          image: 486053612615.dkr.ecr.sa-east-1.amazonaws.com/project-app:91e1c416b00f51c333e9d1ad47f8107a31f7d5b4
          ports:
            - containerPort: 8000
          # DB 접속 정보 (AWS RDS MySQL - Infra/06_rds_setup.sh)
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: DB_PASSWORD
            - name: COUPON_TOTAL
              value: "30000"
          resources:
            requests:
              cpu: "200m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

