# ──────────────────────────────────────────────
# k8s/rds-secret.yaml
# RDS(MySQL) 접속 정보
# Infra/06_rds_setup.sh 에서 생성한 RDS와 매칭
#
# 주의: RDS_ENDPOINT는 RDS 생성 완료 후 실제 엔드포인트로 교체하세요
#   확인 명령: aws rds describe-db-instances \
#     --db-instance-identifier <SERVICE_NAME>-db \
#     --query "DBInstances[0].Endpoint.Address" --output text
# ──────────────────────────────────────────────

# ── 1. ConfigMap (DB 접속 설정) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: rds-config
  namespace: project
data:
  DB_HOST: "devservice-db.c98cyaiwg0hk.eu-central-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "devservicedb"

---
# ── 2. Secret (DB 인증 정보) ──
apiVersion: v1
kind: Secret
metadata:
  name: rds-secret
  namespace: project
type: Opaque
stringData:
  DB_USER: "appuser"                 # Infra/06: --master-username appuser
  DB_PASSWORD: "Password123!"       # Infra/06: --master-user-password
