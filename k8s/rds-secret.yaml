# ──────────────────────────────────────────────
# templates/rds-secret.yaml
# RDS(PostgreSQL) 접속 정보
# Infra/06_rds_setup.sh 에서 생성한 RDS와 매칭
# ──────────────────────────────────────────────

# ── 1. ConfigMap (DB 접속 설정) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: rds-config
  namespace: dev
data:
  DB_HOST: "develop-db.ct0u4g6k6mwp.sa-east-1.rds.amazonaws.com"
  DB_PORT: "5432"
  DB_NAME: "developdb"

---
# ── 2. Secret (DB 인증 정보) ──
apiVersion: v1
kind: Secret
metadata:
  name: rds-secret
  namespace: dev
type: Opaque
stringData:
  DB_USER: "appuser"
  DB_PASSWORD: "Password123!"
