# ──────────────────────────────────────────────
# templates/rds-secret.yaml
# RDS(PostgreSQL) 접속 정보
# Infra/06_rds_setup.sh 에서 생성한 RDS와 매칭
# ──────────────────────────────────────────────

# ── 1. ConfigMap (DB 접속 설정) ──
apiVersion: v1
kind: ConfigMap
metadata:
  name: rds-config
  namespace: __NAMESPACE__
data:
  DB_HOST: "__DB_ENDPOINT__"
  DB_PORT: "5432"
  DB_NAME: "__DB_NAME__"

---
# ── 2. Secret (DB 인증 정보) ──
apiVersion: v1
kind: Secret
metadata:
  name: rds-secret
  namespace: __NAMESPACE__
type: Opaque
stringData:
  DB_USER: "appuser"
  DB_PASSWORD: "Password123!"
