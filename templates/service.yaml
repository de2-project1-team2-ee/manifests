apiVersion: v1
kind: Service
metadata:
  name: project-app-svc
  namespace: __NAMESPACE__
  labels:
    app: project-app
spec:
  type: ClusterIP
  selector:
    app: project-app
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-app-ingress
  namespace: __NAMESPACE__
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: project-app-svc
                port:
                  number: 80
