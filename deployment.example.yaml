# ──────────────────────────────────────────────
# k8s/deployment.example.yaml
# 플레이스홀더 원본 (참조용)
# GitHub Actions CI가 이 파일을 기반으로 deployment.yaml의
# image 값을 자동 업데이트합니다.
#
# 플레이스홀더 설명:
#   __AWS_ACCOUNT_ID__  : AWS 계정 ID (예: 486053612615)
#   __AWS_REGION__      : AWS 리전 (예: eu-central-1)
#   __IMAGE_TAG__       : Docker 이미지 태그 (예: git commit SHA)
# ──────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-app
  namespace: project
  labels:
    app: project-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # 무중단 배포
  template:
    metadata:
      labels:
        app: project-app
    spec:
      containers:
        - name: project-app
          # GitHub Actions CI가 이 값을 자동으로 업데이트합니다.
          image: __AWS_ACCOUNT_ID__.dkr.ecr.__AWS_REGION__.amazonaws.com/project-app:__IMAGE_TAG__
          ports:
            - containerPort: 8000
          # DB 접속 정보 (AWS RDS PostgreSQL - Infra/06_rds_setup.sh)
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: rds-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-secret
                  key: DB_PASSWORD
            - name: COUPON_TOTAL
              value: "300"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
